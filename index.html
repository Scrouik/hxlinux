<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HX Linux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">

      <!-- Header -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">HX</div>
          <span>Linux</span>
        </div>

        <div class="status-pill">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">En attente...</span>
          <span id="status-help" class="status-help" title=""></span>
        </div>

        <div class="header-right">
          <span class="preset-count" id="preset-count"></span>
        </div>
      </header>

      <div class="workspace">
        <section class="list-pane">
          <div class="list-container" id="list-container">
            <ul id="preset-list"></ul>
          </div>
        </section>
        <section class="models-pane" aria-label="HX Models">
          <header class="models-header">
            <div class="models-title">HX Models</div>
            <div class="models-preset" id="preset-label">--</div>
          </header>
          <div class="models-status" id="status">En attente...</div>
          <div class="models-main-stack">
            <main class="models-content models-matrix-host" id="content">
              <div class="empty">Aucun modele charge.</div>
            </main>
            <section
              class="models-params-pane"
              id="models-params-pane"
              data-hx-pane="models-params"
              aria-labelledby="models-params-pane-title"
            >
              <header class="models-params-pane-header">
                <h2 class="models-params-pane-title" id="models-params-pane-title"></h2>
                <div
                  id="models-params-pane-emulation-name"
                  class="models-params-pane-emulation-name"
                  hidden
                ></div>
                <div id="models-params-pane-subhead" class="models-params-pane-subhead"></div>
                <div
                  id="models-params-pane-model-icon-wrap"
                  class="models-params-pane-model-icon-wrap"
                  aria-hidden="true"
                ></div>
              </header>
              <div class="models-params-inner">
                <p class="models-params-placeholder">
                  Les paramètres du bloc sélectionné s’afficheront ici.
                </p>
              </div>
            </section>
          </div>
        </section>
      </div>

      <footer class="statusbar">
        <div class="statusbar-item active-preset" id="bar-active">
          — no preset —
        </div>
        <div class="statusbar-item hint" id="bar-hint">
          Right-click for options · Drag to reorder
        </div>
      </footer>

    </div>

    <!-- Context menu -->
    <div class="ctx-menu" id="ctx-menu">
      <div class="ctx-item" id="ctx-rename">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M11 2l3 3-8 8H3v-3L11 2z"/>
        </svg>
        Rename
      </div>
      <div class="ctx-separator"></div>
      <div class="ctx-item" id="ctx-save">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2v8m-3-3l3 3 3-3M3 13h10"/>
        </svg>
        Save to disk
      </div>
      <div class="ctx-item disabled" id="ctx-load">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 11V3m-3 3l3-3 3 3M3 13h10"/>
        </svg>
        Load from disk
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/models.ts"></script>
  </body>
</html>

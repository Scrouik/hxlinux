<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HX Linux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-base:      #0e0e0f;
        --bg-surface:   #161618;
        --bg-raised:    #1e1e21;
        --bg-hover:     #252529;
        --border:       #2a2a2e;
        --border-light: #38383e;
        --amber:        #e8a020;
        --amber-dim:    #b87a18;
        --amber-glow:   rgba(232, 160, 32, 0.12);
        --green:        #3ddc84;
        --green-glow:   rgba(61, 220, 132, 0.12);
        --text-primary: #e8e8ea;
        --text-dim:     #888890;
        --text-muted:   #4a4a52;
        --drag-over:    rgba(232, 160, 32, 0.08);
        --drag-line:    #e8a020;
        --radius:       4px;
      }

      html, body {
        height: 100%;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: 'Barlow', sans-serif;
        font-size: 14px;
        overflow: hidden;
        user-select: none;
        display: flex;
        justify-content: flex-start;
      }

      /* ─── LAYOUT ─── */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        min-width: 360px;
        max-width: calc(100vw - 24px);
      }

      /* ─── HEADER ─── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        height: 48px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        gap: 12px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        font-weight: 600;
        color: var(--amber);
        letter-spacing: 0.1em;
        /*text-transform: uppercase;*/
      }

      .logo-icon {
        width: 24px;
        height: 24px;
        border: 2px solid var(--amber);
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 12px;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: background 0.3s;
      }

      .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .status-dot.loading   { background: var(--amber); animation: pulse 1s infinite; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .preset-count {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ─── PRESET LIST ─── */
      .list-container {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 4px 0;
        scroll-behavior: smooth;
      }

      .list-container::-webkit-scrollbar {
        width: 4px;
      }
      .list-container::-webkit-scrollbar-track {
        background: transparent;
      }
      .list-container::-webkit-scrollbar-thumb {
        background: var(--border-light);
        border-radius: 2px;
      }

      .preset-item {
        display: flex;
        align-items: center;
        padding: 0 16px;
        height: 36px;
        gap: 12px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: background 0.08s, border-color 0.08s;
        position: relative;
      }

      .preset-item:hover {
        background: var(--bg-hover);
      }

      .preset-item.active {
        background: var(--green-glow);
        border-left-color: var(--green);
      }

      .preset-item.selected {
        background: var(--amber-glow);
        border-left-color: var(--amber);
      }

      .preset-item.drag-over-top::before {
        content: '';
        position: absolute;
        top: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--drag-line);
        box-shadow: 0 0 6px var(--amber);
      }

      .preset-item.drag-over-bottom::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--drag-line);
        box-shadow: 0 0 6px var(--amber);
      }

      .preset-item.dragging {
        opacity: 0.35;
      }

      .preset-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--text-muted);
        min-width: 28px;
        text-align: right;
        flex-shrink: 0;
      }

      .preset-item.active  .preset-num { color: var(--green); }
      .preset-item.selected .preset-num { color: var(--amber); }

      .preset-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .preset-item.active   .preset-name { color: var(--green); }
      .preset-item.selected .preset-name { color: var(--amber); }

      .preset-name.empty {
        color: var(--text-muted);
        font-style: italic;
        font-weight: 400;
      }

      /* drag handle */
      .drag-handle {
        display: flex;
        flex-direction: column;
        gap: 2px;
        opacity: 0;
        transition: opacity 0.1s;
        cursor: grab;
        padding: 4px 2px;
        flex-shrink: 0;
      }
      .drag-handle span {
        display: block;
        width: 12px;
        height: 1.5px;
        background: var(--text-muted);
        border-radius: 1px;
      }
      .preset-item:hover .drag-handle { opacity: 1; }

      /* inline rename */
      .rename-input {
        flex: 1;
        background: var(--bg-base);
        border: 1px solid var(--amber);
        border-radius: var(--radius);
        color: var(--amber);
        font-family: 'Barlow', sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 2px 6px;
        outline: none;
        box-shadow: 0 0 0 2px var(--amber-glow);
      }

      /* ─── CONTEXT MENU ─── */
      .ctx-menu {
        position: fixed;
        z-index: 9999;
        background: var(--bg-raised);
        border: 1px solid var(--border-light);
        border-radius: 6px;
        padding: 4px 0;
        min-width: 180px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
        display: none;
        animation: ctx-appear 0.1s ease;
      }

      @keyframes ctx-appear {
        from { opacity: 0; transform: scale(0.96) translateY(-4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      .ctx-menu.visible { display: block; }

      .ctx-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 14px;
        font-size: 13px;
        color: var(--text-primary);
        cursor: pointer;
        transition: background 0.08s;
      }

      .ctx-item:hover {
        background: var(--bg-hover);
        color: var(--amber);
      }

      .ctx-item.disabled {
        color: var(--text-muted);
        cursor: not-allowed;
      }

      .ctx-item.disabled:hover {
        background: transparent;
        color: var(--text-muted);
      }

      .ctx-icon {
        width: 14px;
        height: 14px;
        opacity: 0.7;
        flex-shrink: 0;
      }

      .ctx-separator {
        height: 1px;
        background: var(--border);
        margin: 4px 0;
      }

      /* ─── STATUS BAR ─── */
      .statusbar {
        height: 24px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
      }

      .statusbar-item {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .statusbar-item.active-preset {
        color: var(--green);
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- Header -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">HX</div>
          <span>Linux</span>
        </div>

        <div class="status-pill">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">En attente...</span>
        </div>

        <div class="header-right">
          <span class="preset-count" id="preset-count"></span>
        </div>
      </header>

      <!-- Preset list -->
      <div class="list-container" id="list-container">
        <ul id="preset-list" style="list-style:none;"></ul>
      </div>

      <!-- Status bar -->
      <footer class="statusbar">
        <div class="statusbar-item active-preset" id="bar-active">
          — no preset —
        </div>
        <div class="statusbar-item" id="bar-hint">
          Right-click for options · Drag to reorder
        </div>
      </footer>

    </div>

    <!-- Context menu -->
    <div class="ctx-menu" id="ctx-menu">
      <div class="ctx-item" id="ctx-rename">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M11 2l3 3-8 8H3v-3L11 2z"/>
        </svg>
        Rename
      </div>
      <div class="ctx-separator"></div>
      <div class="ctx-item" id="ctx-save">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2v8m-3-3l3 3 3-3M3 13h10"/>
        </svg>
        Save to disk
      </div>
      <div class="ctx-item disabled" id="ctx-load">
        <svg class="ctx-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 11V3m-3 3l3-3 3 3M3 13h10"/>
        </svg>
        Load from disk
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

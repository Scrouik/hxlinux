<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HX Models</title>
    <style>
      :root {
        --bg-base: #0e0e0f;
        --bg-surface: #161618;
        --border: #2a2a2e;
        --text-primary: #e8e8ea;
        --text-muted: #7a7a82;
        --amber: #e8a020;
        --green: #3ddc84;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      .header {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
      }
      .title {
        color: var(--amber);
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .preset {
        font-size: 12px;
        color: var(--green);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status {
        font-size: 12px;
        color: var(--text-muted);
      }
      /* Layout haut/bas : voir `.models-main-stack` dans styles.css (import models.ts). */
      .content {
        overflow: auto;
      }
      .flow {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: max-content;
      }
      .flow-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 64px;
      }
      .node {
        width: 132px;
        min-height: 60px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #121215;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .node-title {
        font-size: 11px;
        color: var(--amber);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .node-title img {
        width: 15px;
        height: 15px;
        object-fit: contain;
      }
      .node-name {
        font-size: 12px;
        line-height: 1.25;
      }
      .node.routing {
        border-color: #5a5a62;
      }
      .node.routing .node-title {
        color: #b8b8c0;
      }
      .pipe {
        width: 22px;
        height: 2px;
        background: #4a4a52;
        flex: 0 0 auto;
      }
      .placeholder {
        width: 132px;
        min-height: 60px;
        opacity: 0;
      }
      .empty {
        font-size: 13px;
        color: var(--text-muted);
      }
      /* Alignement sous la première colonne de blocs (après INPUT + pipe), façon HX Edit */
      .hx-edit-chain {
        --hx-io-w: 72px;
        --hx-pipe-w: 22px;
        --hx-gap: 10px;
        --hx-slot-start: calc(var(--hx-io-w) + var(--hx-gap) + var(--hx-pipe-w) + var(--hx-gap));
      }
      .hx-io {
        flex: 0 0 var(--hx-io-w);
        width: var(--hx-io-w);
        min-height: 60px;
        white-space: nowrap;
        border-radius: 8px;
        border: 1px solid #3a3a42;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: #9a9aa4;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: linear-gradient(180deg, #1c1c22 0%, #141418 100%);
      }
      .hx-io-spacer {
        visibility: hidden;
        pointer-events: none;
        border-color: transparent;
        background: transparent;
      }
      .hx-path-block .grid16-branch-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .grid16-row-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .grid16-branch-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }
      .grid16-row {
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .hx-path-block .grid16-row {
        border-bottom: none;
        padding-bottom: 0;
      }
      .hx-edit-chain > .grid16-row-wrap:last-child .grid16-row {
        border-bottom: none;
        padding-bottom: 0;
      }
      .node-empty {
        border-style: dashed;
        opacity: 0.85;
        background: #0f0f12;
      }
      .node-empty .node-title {
        color: var(--text-muted);
      }
      .node-empty .node-name {
        color: var(--text-muted);
        font-size: 11px;
      }
      .hx-routing-junction {
        display: flex;
        flex-direction: row;
        align-items: center;
        min-height: 40px;
        margin: 2px 0 6px 0;
      }
      .hx-routing-gutter {
        flex: 0 0 var(--hx-slot-start);
        width: var(--hx-slot-start);
        min-height: 1px;
      }
      .hx-routing-junction-body {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }
      .hx-routing-rail {
        width: 3px;
        align-self: stretch;
        min-height: 32px;
        border-radius: 2px;
        background: linear-gradient(180deg, #c44a3a 0%, #8a3228 100%);
        opacity: 0.92;
      }
      .hx-routing-junction-inner {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .routing-chip {
        font-size: 10px;
        font-weight: 600;
        color: #c8c8d0;
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid #5a5a62;
        background: #1e1e24;
      }
      .hx-routing-node {
        letter-spacing: 0.02em;
      }
      .hx-edit-chain > .hx-path-block ~ .hx-path-block {
        margin-top: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">HX Models</div>
        <div class="preset" id="preset-label">--</div>
      </header>
      <div class="status" id="status" style="padding:8px 14px;border-bottom:1px solid var(--border);">En attente...</div>
      <div class="models-main-stack">
        <main class="content models-pane models-content models-matrix-host" id="content">
          <div class="empty">Aucun modele charge.</div>
        </main>
        <section
          class="models-params-pane"
          id="models-params-pane"
          data-hx-pane="models-params"
          aria-labelledby="models-params-pane-title"
        >
          <header class="models-params-pane-header">
            <h2 class="models-params-pane-title" id="models-params-pane-title"></h2>
            <div id="models-params-pane-subhead" class="models-params-pane-subhead"></div>
            <div id="models-params-pane-basedon" class="models-params-pane-basedon"></div>
            <div
              id="models-params-pane-model-icon-wrap"
              class="models-params-pane-model-icon-wrap"
              aria-hidden="true"
            ></div>
          </header>
          <div class="models-params-inner">
            <p class="models-params-placeholder">
              Les paramètres du bloc sélectionné s’afficheront ici.
            </p>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/models.ts"></script>
  </body>
  </html>

<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HX Models</title>
    <style>
      :root {
        --bg-base: #0e0e0f;
        --bg-surface: #161618;
        --border: #2a2a2e;
        --text-primary: #e8e8ea;
        --text-muted: #7a7a82;
        --amber: #e8a020;
        --green: #3ddc84;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      .header {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
      }
      .title {
        color: var(--amber);
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .preset {
        font-size: 12px;
        color: var(--green);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status {
        font-size: 12px;
        color: var(--text-muted);
      }
      .content {
        flex: 1;
        overflow: auto;
      }
      .list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .item {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        padding: 9px 14px;
        border-bottom: 1px solid var(--border);
      }
      .category {
        color: var(--amber);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .name {
        color: var(--text-primary);
        font-size: 13px;
      }
      .empty {
        padding: 14px;
        font-size: 13px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">HX Models</div>
        <div class="preset" id="preset-label">--</div>
      </header>
      <div class="status" id="status" style="padding:8px 14px;border-bottom:1px solid var(--border);">En attente...</div>
      <main class="content" id="content">
        <div class="empty">Aucun modele charge.</div>
      </main>
    </div>
    <script type="module" src="/src/models.ts"></script>
  </body>
  </html>

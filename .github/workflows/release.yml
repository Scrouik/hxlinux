name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: HXLinux ${{ github.ref_name }}
          releaseBody: |
            ## First usable test build (HX Stomp XL · Linux)

            **Pre-release / early testers** — save your presets before trying.

            ### Install

            | Format | How |
            |--------|-----|
            | **AppImage** | `chmod +x hxlinux_*.AppImage` then run it |
            | **.deb** | `sudo dpkg -i hxlinux_*.deb` |

            Full instructions: [docs/install.en.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/install.en.md)

            ### Requirements

            - Linux (Ubuntu/Debian family tested)
            - Line 6 **HX Stomp XL** via USB
            - [udev rule](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/packaging/99-line6-helix.rules) for USB access (no `sudo`)

            ### Features

            See [docs/features-v1.en.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/features-v1.en.md).

          releaseDraft: false
          prerelease: true
          args: --target x86_64-unknown-linux-gnu
